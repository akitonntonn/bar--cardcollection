<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1330" />
    <meta
      name="description"
      content="BAR & のスタッフ・常連・イベント限定カードを集めるWeb図鑑。集めて、見せて、またBAR &に来たくなる。"
    />
    <title>& STAFF CARD COLLECTION | BAR &amp;</title>

    <!-- OGP（LINE/Instagram/X でURLを共有した時の見え方） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BAR &amp;" />
    <meta property="og:title" content="& STAFF CARD COLLECTION" />
    <meta property="og:description" content="集めて、見せて、またBAR &に来たくなる。毎日1回無料ガチャでスタッフカードを集めよう。" />
    <meta property="og:url" content="https://bar--cardcollection.pages.dev/" />
    <meta property="og:image" content="https://bar--cardcollection.pages.dev/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />

    <!-- PWA（ホーム画面に追加でアプリ風に起動） -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="&CARD" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-fx" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="shell">
      <!-- ===================== 1. HERO ===================== -->
      <header class="hero">
        <div class="hero__inner">
          <div id="authBar" class="authbar" aria-live="polite"><!-- JSで描画 --></div>
          <span class="hero__eyebrow eyebrow">Trading Staff Cards</span>
          <h1 class="hero__title">
            <span class="amp">&amp;</span>STAFF<br />CARD COLLECTION
          </h1>
          <p class="hero__subtitle">集めて、見せて、またBAR &amp;に来たくなる。</p>

          <button id="gachaBtn" class="btn gacha" type="button">
            <span class="gacha__icon" aria-hidden="true">🎴</span>
            <span>今日の1枚を引く</span>
          </button>
          <div id="gachaStatus" class="gacha-status" aria-live="polite"></div>
          <p class="gacha__note">
            🎁 新規登録でガチャ3回プレゼント！1日1回引けます（被りあり）。<br />
            SR=激レア5%／SSR=誕生日・来店記念のみ。被り3枚で無料ガチャ
          </p>
        </div>
      </header>

      <!-- ===================== 2. STATS ===================== -->
      <section class="stats" id="stats" aria-label="コレクション状況">
        <!-- JSで描画 -->
      </section>

      <!-- ===================== 3. FILTERS ===================== -->
      <div class="section-head">
        <h2>コレクション</h2>
        <span class="eyebrow">Filter</span>
      </div>
      <nav class="filters" id="filters" aria-label="レアリティで絞り込み">
        <!-- JSで描画 -->
      </nav>

      <!-- ===================== 4. COLLECTION GRID ===================== -->
      <section
        class="grid"
        id="grid"
        aria-label="スタッフカード一覧"
        aria-live="polite"
      >
        <!-- JSで描画 -->
      </section>

      <footer class="site-foot">
        <p class="foot-logo">BAR <span class="amp">&amp;</span></p>
        <p>夜・ゲーム・スタッフ愛・コレクション。集めるほど、また会いたくなる。</p>
        <p class="foot-soon">
          🎫 来店QRで特別カードGET ／ 📤 シェア機能 対応済み<br />
          COMING SOON — ランキング / 新カード追加
        </p>
        <p><a class="foot-link" href="./about.html">📖 このサービスについて（紹介ページ）</a></p>
      </footer>
    </main>

    <!-- ===================== 5. DETAIL MODAL ===================== -->
    <div class="modal" id="modal" hidden>
      <div class="modal__backdrop" data-close="true"></div>
      <div
        class="modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button class="modal__close" id="modalClose" type="button" data-close="true" aria-label="閉じる">
          ✕
        </button>
        <div class="modal__body" id="modalBody">
          <!-- JSで描画。aria-labelledby 用に id="modalTitle" を中に持たせる -->
        </div>
      </div>
    </div>

    <!-- ===================== TOAST ===================== -->
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <!-- Supabase クライアント（認証・DB・サーバ側ガチャ） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./data/config.js"></script>
    <script src="./data/cards.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
